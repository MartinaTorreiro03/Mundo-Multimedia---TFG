<div class="galeria-grid">
  @for (dispositivo of dispositivos; track dispositivo.id) {
    <div class="item-dispositivo">
      <img [src]="dispositivo.imagen" [alt]="dispositivo.nombre" />
      <span class="item-nombre" [appSpeakable]="dispositivo.nombre">{{ dispositivo.nombre }}</span>
      <section class="item-play-wrap">
        <button type="button" class="btn-explorar" (click)="toggleAudio(dispositivo, $event)">
          {{ dispositivoSonando === dispositivo.id ? '⏸ Pausar' : '▶ Reproducir fragmento' }}
        </button>
        @if (voiceNav.enabled()) {
          <span class="voz-pista voz-pista--debajo-control" aria-hidden="true">{{ pistaPlay(dispositivo.id) }}</span>
        }
      </section>
      <span [appSpeakable]="'Botón. Reproducir fragmento de ' + dispositivo.nombre"></span>
    </div>
  }
</div>

@for (d of dispositivos; track d.id) {
  <audio
    [id]="'audio-' + d.id"
    [src]="d.audio"
    (ended)="onAudioEnded(d.id)"
  ></audio>
}
